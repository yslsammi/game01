<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>農場拔拔樂</title>
    <style>
        /* === 基礎設定 === */
        body {
            margin: 0; padding: 0;
            font-family: "Microsoft JhengHei", "Heiti TC", sans-serif;
            overflow: hidden;
            background-color: #222;
            user-select: none; -webkit-user-select: none; touch-action: none;
            height: 100vh; width: 100vw;
            display: flex; justify-content: center; align-items: center;
        }

        /* === 視覺游標 (紅圈) === */
        #visual-cursor {
            position: fixed; width: 30px; height: 30px;
            border: 3px solid rgba(255, 0, 0, 0.7); border-radius: 50%;
            pointer-events: none; z-index: 9999;
            transform: translate(-50%, -50%); display: none;
        }
        #visual-cursor::after {
            content: ''; display: block; width: 4px; height: 4px;
            background: red; margin: 13px auto; border-radius: 50%;
        }

        /* === 設定頁面 === */
        #scene-setup {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #f4f4f4; z-index: 100;
            display: flex; flex-direction: column;
            align-items: center; justify-content: flex-start;
            padding-top: 10px; overflow-y: auto;
        }

        .section {
            width: 90%; max-width: 700px; margin-bottom: 15px; padding: 15px;
            border: 1px solid #ddd; border-radius: 12px;
            background: #fff; text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        h1 { margin: 10px 0 20px 0; font-size: 32px; color: #2e7d32; text-shadow: 1px 1px 2px rgba(0,0,0,0.1); }
        label { font-size: 18px; font-weight: bold; display: block; margin-bottom: 10px; color: #444; }

        /* 背景按鈕 */
        .bg-grid { display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; }
        .bg-option {
            width: 50px; height: 50px;
            border: 3px solid #ccc; border-radius: 8px; cursor: pointer;
            background-size: cover; background-position: center;
        }
        .bg-option.active { border-color: #28a745; transform: scale(1.1); box-shadow: 0 0 8px #28a745; }
        .bg-black { background: black; }
        .bg-white { background: white; }
        .bg-sky { background: linear-gradient(to bottom, #87ceeb, #fff); }
        .bg-farm { background: linear-gradient(to bottom, #87CEEB 0%, #87CEEB 55%, #8B4513 55%, #8B4513 100%); }

        /* 蔬菜選擇器 */
        .veg-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(80px, 1fr)); gap: 15px; margin-top: 10px; }
        .veg-select-btn {
            background: #f8f8f8; border: 2px solid #ccc; border-radius: 12px;
            padding: 10px 5px; cursor: pointer; transition: all 0.2s;
            display: flex; flex-direction: column; align-items: center; opacity: 0.5; transform: scale(0.95);
        }
        .veg-select-btn.selected { 
            background: #fff; border: 6px solid #00c853; opacity: 1; 
            transform: scale(1.1); box-shadow: 0 0 15px rgba(0, 200, 83, 0.6); z-index: 2;
        }
        .veg-select-btn span.emoji { font-size: 35px; line-height: 1.2; }
        .veg-select-btn span.name { font-size: 15px; font-weight: bold; color: #333; margin-top: 5px; }
        .veg-select-btn[data-id="bokchoy"] .emoji { filter: hue-rotate(45deg) brightness(1.3); }

        .btn-action-row { margin-top: 10px; display: flex; gap: 10px; justify-content: center; }
        .btn-small { padding: 5px 15px; font-size: 14px; background: #eee; border: 1px solid #ccc; border-radius: 5px; cursor: pointer; }

        #btn-start {
            width: 80%; max-width: 300px; padding: 15px; font-size: 22px;
            background: #28a745; color: white; border: none; border-radius: 50px;
            font-weight: bold; cursor: pointer; box-shadow: 0 4px #1e7e34; margin-bottom: 20px;
        }
        #btn-start:disabled { background: #ccc; cursor: not-allowed; box-shadow: none; }

        /* === 音樂上傳區 (美化版) === */
        .music-upload-box {
            border: 2px dashed #2196F3; padding: 20px; border-radius: 15px; background: #e3f2fd;
            display: flex; flex-direction: column; align-items: center; gap: 10px;
        }
        /* 隱藏原始醜醜的 input */
        input[type="file"] { display: none; }
        
        /* 自訂的大按鈕 */
        .custom-file-upload {
            border: 1px solid #1976D2;
            display: inline-block;
            padding: 15px 30px;
            cursor: pointer;
            background: #2196F3;
            color: white;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: all 0.2s;
        }
        .custom-file-upload:hover { background: #1976D2; transform: translateY(-2px); }
        .custom-file-upload:active { transform: translateY(1px); }

        /* === 遊戲畫面 === */
        #scene-game {
            display: none; position: relative; width: 100%; height: 100%;
            max-width: 1600px; aspect-ratio: 16 / 9; background: black;
            overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        @media (max-aspect-ratio: 4/3) { #scene-game { max-width: 100%; aspect-ratio: auto; } }

        #hud-container {
            position: absolute; top: 10px; left: 10px;
            display: flex; align-items: flex-start; pointer-events: none; z-index: 50;
        }
        #basket-icon { font-size: 60px; line-height: 1; margin-right: -10px; z-index: 2; filter: drop-shadow(2px 2px 2px rgba(0,0,0,0.5)); }
        #collection-area {
            background: rgba(255,255,255,0.9); border-radius: 15px;
            padding: 5px 10px 5px 25px; min-width: 120px; min-height: 50px;
            display: flex; flex-wrap: wrap; align-items: center; gap: 2px;
            border: 3px solid #8d6e63; box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }
        .mini-veg { font-size: 20px; animation: popIn 0.3s ease-out; line-height: 1; }
        .mini-veg.bokchoy-style { filter: hue-rotate(45deg) brightness(1.3); }
        @keyframes popIn { from { transform: scale(0); } to { transform: scale(1); } }

        .top-right-btns {
            position: absolute; top: 10px; right: 10px; z-index: 100;
            display: flex; gap: 10px;
        }
        .game-btn {
            padding: 10px 15px; background: rgba(255,255,255,0.9);
            color: #333; font-weight: bold; border-radius: 30px;
            border: 3px solid #333; cursor: pointer;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3); font-size: 16px;
        }
        .game-btn:active { transform: translateY(2px); }

        /* === 蔬菜本體 === */
        .veg-item {
            position: absolute; font-size: 4em; line-height: 1; cursor: pointer; 
            padding: 40px; margin: -40px; transition: transform 0.2s;
            filter: drop-shadow(0 5px 10px rgba(0,0,0,0.3)); will-change: transform;
        }
        .veg-item.bokchoy-style { filter: hue-rotate(45deg) brightness(1.3) drop-shadow(0 5px 10px rgba(0,0,0,0.3)); }
        .veg-locked { transform: scale(1.5) !important; z-index: 80 !important; filter: drop-shadow(0 0 30px white) !important; }
        .veg-focus { transform: scale(1.4); z-index: 60; }
        .veg-item:not(.bokchoy-style).veg-focus { filter: drop-shadow(0 0 20px yellow); }
        .veg-item.bokchoy-style.veg-focus { filter: hue-rotate(45deg) brightness(1.3) drop-shadow(0 0 20px white); }
        .veg-flying {
            transition: all 0.8s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            opacity: 0; pointer-events: none; z-index: 100;
        }

        #scene-end {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); z-index: 200;
            flex-direction: column; align-items: center; justify-content: center; color: white;
        }
    </style>
</head>
<body>

    <div id="visual-cursor"></div>
    
    <div id="scene-setup">
        <h1>🚜 農場拔拔樂 🌾</h1>
        
        <div class="section">
            <label>1. 背景音樂 (必選步驟)</label>
            <div class="music-upload-box">
                <label for="local-music-input" class="custom-file-upload">
                    📂 點此選取桌面音樂
                </label>
                <input type="file" id="local-music-input" accept="audio/*">
                
                <p id="file-name-display" style="margin:10px 0; color:#1976D2; font-weight:bold;">(未選取檔案)</p>

                <audio id="bgm-player" controls loop style="width: 90%;">
                    您的瀏覽器不支援 audio 元素。
                </audio>
                <p style="font-size:12px; color:#555;">⬆️ 選好後請按播放鍵測試，確認有聲再開始。</p>
            </div>
        </div>

        <div class="section">
            <label>2. 背景選擇</label>
            <div class="bg-grid">
                <div class="bg-option bg-black" onclick="setBg('black', this)"></div>
                <div class="bg-option bg-white" onclick="setBg('white', this)"></div>
                <div class="bg-option bg-sky" onclick="setBg('sky', this)"></div>
                <div class="bg-option bg-farm active" onclick="setBg('farm', this)"></div>
            </div>
            <p id="bg-text" style="margin:5px 0 0 0; color:#666; font-size:14px;">泥土藍天</p>
        </div>

        <div class="section">
            <label>3. 選擇蔬菜</label>
            <div class="btn-action-row">
                <button class="btn-small" onclick="selectAllVeg(true)">全選</button>
                <button class="btn-small" onclick="selectAllVeg(false)">全不選</button>
            </div>
            <div class="veg-grid" id="veg-selection-container"></div>
            <p id="veg-count-msg" style="color:red; font-size:14px; display:none;">請至少選擇一種蔬菜！</p>
        </div>

        <div class="section">
            <label>4. 蔬菜大小: <span id="txt-size">15%</span></label>
            <input type="range" id="inp-size" min="10" max="30" value="15" style="width:100%" oninput="uiUpdate()">
        </div>

        <div class="section">
            <label>5. 注視時間: <span id="txt-time">1.0秒</span></label>
            <input type="range" id="inp-time" min="5" max="30" value="10" style="width:100%" oninput="uiUpdate()">
        </div>

        <button id="btn-start" onclick="gameStart()">開始遊戲</button>
    </div>

    <div id="scene-game">
        <div class="top-right-btns">
            <button class="game-btn" onclick="toggleMusic()">🎵 音樂開關</button>
            <button class="game-btn" onclick="goHome()">🏠 主頁</button>
        </div>
        
        <div id="hud-container">
            <div id="basket-icon">🧺</div>
            <div id="collection-area">
                <span style="color:#888; font-size:14px;">收集: </span>
            </div>
        </div>
    </div>

    <div id="scene-end">
        <h1 style="font-size:3em; color:yellow;">任務完成！</h1>
        <div id="end-collection" style="font-size:2em; margin:20px; background:rgba(255,255,255,0.2); padding:20px; border-radius:20px;"></div>
        <button id="btn-start" onclick="goHome()">返回主頁</button>
    </div>

    <script>
        // === 音樂系統 ===
        const bgmPlayer = document.getElementById('bgm-player');
        const musicInput = document.getElementById('local-music-input');
        const fileNameDisplay = document.getElementById('file-name-display');

        musicInput.addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const fileURL = URL.createObjectURL(file);
                bgmPlayer.src = fileURL;
                fileNameDisplay.innerText = "✅ 已選取: " + file.name;
                bgmPlayer.volume = 0.5;
                bgmPlayer.play(); // 自動試播
            }
        });

        function toggleMusic() {
            if (bgmPlayer.paused) {
                bgmPlayer.play();
            } else {
                bgmPlayer.pause();
            }
        }

        // === 蔬菜資料庫 ===
        const allVeggiesDB = [
            { id: 'lettuce', emoji: '🥬', name: '生菜' },
            { id: 'bokchoy', emoji: '🥬', name: '白菜', isBokChoy: true }, 
            { id: 'tomato',  emoji: '🍅', name: '番茄' },
            { id: 'corn',    emoji: '🌽', name: '粟米' },
            { id: 'carrot',  emoji: '🥕', name: '紅蘿蔔' },
            { id: 'eggplant',emoji: '🍆', name: '茄子' },
            { id: 'broccoli',emoji: '🥦', name: '西蘭花' },
            { id: 'pumpkin', emoji: '🎃', name: '南瓜' }
        ];

        var config = { bg: 'farm', sizeVW: 15, dwellTime: 1000, activeVeggies: [] };
        var state = { score: 0, target: 10, playing: false, timer: null, isMobileAction: false };

        window.onload = function() {
            renderVegSelection();
            uiUpdate();
            setBg('farm', document.querySelector('.bg-farm'));
            // 嘗試載入預設 (如果使用者懶得選，還是可以用預設的網上資源)
            if(!bgmPlayer.src) {
                bgmPlayer.src = "https://upload.wikimedia.org/wikipedia/commons/b/b2/Kevin_MacLeod_-_The_Builder.ogg";
            }
        };

        // === 設定頁面邏輯 ===
        function renderVegSelection() {
            const container = document.getElementById('veg-selection-container');
            container.innerHTML = '';
            allVeggiesDB.forEach((veg) => {
                const btn = document.createElement('div');
                btn.className = 'veg-select-btn selected';
                btn.dataset.id = veg.id;
                btn.onclick = function() { toggleVeg(this); };
                btn.innerHTML = `<span class="emoji">${veg.emoji}</span><span class="name">${veg.name}</span>`;
                container.appendChild(btn);
            });
        }

        function toggleVeg(btn) {
            btn.classList.toggle('selected'); validateStartButton();
        }
        function selectAllVeg(isSelect) {
            document.querySelectorAll('.veg-select-btn').forEach(btn => {
                if(isSelect) btn.classList.add('selected'); else btn.classList.remove('selected');
            }); validateStartButton();
        }
        function validateStartButton() {
            const selected = document.querySelectorAll('.veg-select-btn.selected');
            const btnStart = document.getElementById('btn-start');
            const msg = document.getElementById('veg-count-msg');
            if (selected.length === 0) { btnStart.disabled = true; msg.style.display = 'block'; } else { btnStart.disabled = false; msg.style.display = 'none'; }
        }

        document.addEventListener('mousemove', function(e) {
            var cursor = document.getElementById('visual-cursor');
            cursor.style.display = 'block'; cursor.style.left = e.clientX + 'px'; cursor.style.top = e.clientY + 'px';
        });

        function uiUpdate() {
            var sizeVal = document.getElementById('inp-size').value;
            config.sizeVW = parseInt(sizeVal);
            document.getElementById('txt-size').innerText = sizeVal + '%';
            var timeVal = document.getElementById('inp-time').value;
            config.dwellTime = timeVal * 100;
            document.getElementById('txt-time').innerText = (config.dwellTime/1000).toFixed(1) + " 秒";
        }

        function setBg(type, el) {
            config.bg = type;
            document.querySelectorAll('.bg-option').forEach(o => o.classList.remove('active'));
            el.classList.add('active');
            var names = {'black':'純黑', 'white':'純白', 'sky':'藍天', 'farm':'泥土藍天'};
            document.getElementById('bg-text').innerText = names[type];
        }

        function gameStart() {
            const selectedBtns = document.querySelectorAll('.veg-select-btn.selected');
            config.activeVeggies = [];
            selectedBtns.forEach(btn => {
                const vegData = allVeggiesDB.find(v => v.id === btn.dataset.id);
                if(vegData) config.activeVeggies.push(vegData);
            });
            if(config.activeVeggies.length === 0) return;

            // 確保音樂繼續播放
            if (bgmPlayer.src) {
                bgmPlayer.play().catch(e => console.log(e));
            }

            document.getElementById('scene-setup').style.display = 'none';
            document.getElementById('scene-end').style.display = 'none';
            var game = document.getElementById('scene-game');
            game.style.display = 'block';

            game.style.background = '';
            if(config.bg === 'black') game.style.background = '#000';
            else if(config.bg === 'white') game.style.background = '#fff';
            else if(config.bg === 'sky') game.style.background = 'linear-gradient(to bottom, #87ceeb, #fff)';
            else if(config.bg === 'farm') { 
                game.style.background = 'linear-gradient(to bottom, #87CEEB 0%, #87CEEB 55%, #8B4513 55%, #8B4513 100%)';
            }

            document.getElementById('collection-area').innerHTML = '<span style="color:#888; font-size:14px;">收集: </span>';
            state.score = 0;
            speak(""); state.playing = true;
            spawnVeg();
        }

        function goHome() {
            state.playing = false;
            // 回主頁不停止音樂，讓老師方便繼續調整
            if(state.timer) clearTimeout(state.timer);
            document.querySelectorAll('.veg-item').forEach(el => el.remove());
            document.getElementById('scene-game').style.display = 'none';
            document.getElementById('scene-end').style.display = 'none';
            document.getElementById('scene-setup').style.display = 'flex';
        }

        function speak(text) {
            if(!window.speechSynthesis) return; window.speechSynthesis.cancel();
            if(text === "") return;
            var u = new SpeechSynthesisUtterance(text); u.lang = 'zh-HK'; u.rate = 0.8;
            window.speechSynthesis.speak(u);
        }

        function spawnVeg() {
            if(!state.playing) return;
            if(state.score >= state.target) { gameWin(); return; }

            var game = document.getElementById('scene-game');
            var data = config.activeVeggies[Math.floor(Math.random() * config.activeVeggies.length)];

            var el = document.createElement('div');
            el.className = 'veg-item';
            if(data.isBokChoy) el.classList.add('bokchoy-style');
            
            el.innerText = data.emoji;
            el.style.fontSize = config.sizeVW + 'vw'; 

            var x = 10 + Math.random() * 70;
            var y = 20 + Math.random() * 50; 
            if(config.bg === 'farm') y = 60 + Math.random() * 25; 

            el.style.left = x + '%'; el.style.top = y + '%';

            el.dataset.vegName = data.name;
            el.dataset.emoji = data.emoji;
            el.dataset.isBokChoy = data.isBokChoy;

            el.addEventListener('mouseenter', function() { if(state.isMobileAction) return; focusVeg(el); });
            el.addEventListener('mouseleave', function() { unfocusVeg(el); });
            el.addEventListener('touchstart', function(e) { e.preventDefault(); state.isMobileAction = true; triggerLockSequence(el); }, {passive: false});
            el.addEventListener('click', function() { state.isMobileAction = true; triggerLockSequence(el); });

            game.appendChild(el);
        }

        function focusVeg(el) {
            if(el.done || el.locked) return; 
            el.classList.add('veg-focus');
            state.timer = setTimeout(function() { triggerLockSequence(el); }, config.dwellTime);
        }

        function unfocusVeg(el) {
            if(el.locked) return;
            el.classList.remove('veg-focus'); 
            if(state.timer) { clearTimeout(state.timer); state.timer = null; }
        }

        function triggerLockSequence(el) {
            if(state.timer) clearTimeout(state.timer);
            if(el.done || el.locked) return;
            
            el.locked = true;
            el.classList.remove('veg-focus');
            el.classList.add('veg-locked');

            speak(el.dataset.vegName);

            // 等待語音讀完
            setTimeout(function() {
                successVeg(el);
            }, 1500);
        }

        function successVeg(el) {
            if(el.done) return; 
            el.done = true;
            state.score++; 
            
            speak('拔起咗啦');

            const basket = document.getElementById('basket-icon'); const basketRect = basket.getBoundingClientRect(); const vegRect = el.getBoundingClientRect();
            const targetX = basketRect.left + basketRect.width/2 - (vegRect.left + vegRect.width/2);
            const targetY = basketRect.top + basketRect.height/2 - (vegRect.top + vegRect.height/2);

            el.classList.remove('veg-locked'); 
            el.classList.add('veg-flying');
            el.style.transform = `translate(${targetX}px, ${targetY}px) scale(0.1) rotate(360deg)`;

            setTimeout(function() {
                addMiniVegToBasket(el.dataset.emoji, el.dataset.isBokChoy === 'true');
                el.remove(); spawnVeg(); state.isMobileAction = false;
            }, 800);
        }

        function addMiniVegToBasket(emoji, isBokChoy) {
            const collection = document.getElementById('collection-area');
            const mini = document.createElement('span');
            mini.className = 'mini-veg';
            if(isBokChoy) mini.classList.add('bokchoy-style');
            mini.innerText = emoji;
            collection.appendChild(mini);
        }

        function gameWin() {
            state.playing = false;
            document.getElementById('scene-end').style.display = 'flex';
            document.getElementById('end-collection').innerHTML = document.getElementById('collection-area').innerHTML;
            speak('好犀利！全部拔晒啦！');
        }
    </script>
</body>
</html>
